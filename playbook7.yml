---
- name: Install multipel s/w apps
  hosts: all
  tasks:
    - name: Install java
      apt:
        name: openjdk-21-jdk
        state: present
        update_cache: yes
    - name: Install git
      apt:
        name: git
        state: present
        update_cache: no
    - name: Install maven
      apt:
        name: maven
        state: present
        update_cache: no
...

